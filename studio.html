<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio — Little Miracles</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #161616;
            color: #D4AF37;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === LOCK SCREEN === */
        #lock-screen {
            text-align: center;
            padding: 40px;
        }

        #lock-screen h2 {
            font-size: 28px;
            letter-spacing: 5px;
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 8px;
        }

        #lock-screen p {
            font-size: 13px;
            letter-spacing: 2px;
            color: #555;
            margin-bottom: 40px;
        }

        .lock-box {
            border: 1px solid #2a2a2a;
            padding: 50px 40px;
            background: #0d0d0d;
        }

        #password-input {
            display: block;
            width: 260px;
            padding: 14px 18px;
            background: #1e1e1e;
            border: 1px solid #333;
            color: #D4AF37;
            font-size: 16px;
            letter-spacing: 3px;
            text-align: center;
            outline: none;
            margin: 0 auto 16px;
        }

        #password-input:focus { border-color: #D4AF37; }

        .btn {
            display: inline-block;
            padding: 13px 40px;
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            font-size: 12px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn:hover { background: #D4AF37; color: #161616; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #lock-error {
            margin-top: 16px;
            font-size: 12px;
            color: #c0392b;
            letter-spacing: 2px;
            min-height: 18px;
        }

        /* === STUDIO === */
        #studio {
            display: none;
            width: 100%;
            max-width: 760px;
            padding: 60px 40px;
            text-align: center;
        }

        #studio h1 {
            font-size: 32px;
            letter-spacing: 6px;
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 6px;
        }

        #studio .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            color: #555;
            margin-bottom: 50px;
        }


        #prompt {
            width: 100%;
            height: 120px;
            padding: 16px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        #prompt:focus { border-color: #D4AF37; }
        #prompt::placeholder { color: #444; }

        .options-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .options-row select {
            flex: 1;
            padding: 11px 14px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: #888;
            font-size: 12px;
            letter-spacing: 1px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }

        .options-row select:focus { border-color: #D4AF37; }

        #status-box {
            min-height: 44px;
            padding: 12px;
            margin-bottom: 24px;
            border: 1px solid #2a2a2a;
            font-size: 12px;
            letter-spacing: 1px;
            color: #555;
            text-align: left;
            background: #0d0d0d;
            display: none;
        }

        #status-box.active { display: block; }
        #status-box.error { color: #c0392b; border-color: #3a1a1a; }
        #status-box.success { color: #27ae60; border-color: #1a3a1a; }

        #result-video {
            width: 100%;
            margin-top: 30px;
            border: 1px solid #2a2a2a;
            display: none;
            background: #000;
        }

        #download-btn {
            display: none;
            margin-top: 16px;
        }

        .divider {
            border: none;
            border-top: 1px solid #2a2a2a;
            margin: 40px 0;
        }

        .hint {
            font-size: 11px;
            color: #333;
            letter-spacing: 1px;
            line-height: 1.8;
            text-align: left;
        }
    </style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
    <h2>STUDIO</h2>
    <p>PRIVATE ACCESS</p>
    <div class="lock-box">
        <input type="password" id="password-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') unlock()">
        <button class="btn" onclick="unlock()">ENTER</button>
        <div id="lock-error"></div>
    </div>
</div>

<!-- STUDIO -->
<div id="studio">
    <h1>VIDEO STUDIO</h1>
    <p class="subtitle">POWERED BY VEO 2</p>

    <textarea id="prompt" placeholder="Describe your video... (in English for best results)&#10;Example: A misty forest at dawn, sunlight filtering through ancient trees, cinematic slow motion"></textarea>

    <div class="options-row">
        <select id="duration">
            <option value="5">5 seconds</option>
            <option value="8">8 seconds</option>
        </select>
        <select id="aspect">
            <option value="16:9">16:9 Landscape</option>
            <option value="9:16">9:16 Portrait</option>
            <option value="1:1">1:1 Square</option>
        </select>
    </div>

    <button class="btn" id="generate-btn" onclick="generateVideo()">GENERATE VIDEO</button>

    <div id="status-box"></div>

    <video id="result-video" controls></video>
    <a id="download-btn" class="btn" download="video.mp4">DOWNLOAD VIDEO</a>

    <hr class="divider">

    <div class="hint">
        ✦ Generation takes 1–3 minutes — please wait after clicking<br>
        ✦ Your API key is securely stored on the server<br>
        ✦ For best results describe scene, mood, camera movement, lighting
    </div>
</div>

<script>
    // ═══════════════════════════════════════
    // CHANGE THIS PASSWORD:
    const ACCESS_PASSWORD = 'studio2024';
    // ═══════════════════════════════════════

    function unlock() {
        const input = document.getElementById('password-input').value;
        if (input === ACCESS_PASSWORD) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('studio').style.display = 'block';
        } else {
            document.getElementById('lock-error').textContent = 'INCORRECT PASSWORD';
            document.getElementById('password-input').value = '';
            document.getElementById('password-input').focus();
        }
    }

    function setStatus(msg, type = '') {
        const box = document.getElementById('status-box');
        box.textContent = msg;
        box.className = 'status-box active ' + type;
        box.style.display = 'block';
    }

    const WORKER_URL = 'https://sweet-shadow-5605.axis-mobile-studio.workers.dev';

    async function generateVideo() {
        const prompt = document.getElementById('prompt').value.trim();
        const duration = document.getElementById('duration').value;
        const aspect = document.getElementById('aspect').value;
        const btn = document.getElementById('generate-btn');

        if (!prompt) { setStatus('⚠ Please describe your video', 'error'); return; }

        btn.disabled = true;
        setStatus('⏳ Sending request to Veo 2...');

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt,
                    durationSeconds: parseInt(duration),
                    aspectRatio: aspect
                })
            });

            const data = await response.json();

            if (!response.ok || data.error) {
                setStatus('✗ Error: ' + (data.error?.message || JSON.stringify(data)), 'error');
                btn.disabled = false;
                return;
            }

            if (data.name) {
                setStatus('⏳ Generating... this takes 1–3 minutes');
                pollOperation(data.name);
            } else {
                setStatus('✗ Unexpected response: ' + JSON.stringify(data), 'error');
                btn.disabled = false;
            }

        } catch (err) {
            setStatus('✗ Network error: ' + err.message, 'error');
            btn.disabled = false;
        }
    }

    async function pollOperation(operationName) {
        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'poll', operationName })
            });
            const data = await response.json();

            if (data.done) {
                const btn = document.getElementById('generate-btn');
                btn.disabled = false;

                const videos = data.response?.generatedSamples || data.response?.videos;
                if (videos && videos.length > 0) {
                    const video = videos[0];
                    const videoEl = document.getElementById('result-video');
                    const downloadBtn = document.getElementById('download-btn');

                    if (video.video?.uri || video.uri) {
                        const uri = video.video?.uri || video.uri;
                        videoEl.src = uri;
                        downloadBtn.href = uri;
                    } else if (video.video?.bytesBase64Encoded || video.bytesBase64Encoded) {
                        const b64 = video.video?.bytesBase64Encoded || video.bytesBase64Encoded;
                        const src = 'data:video/mp4;base64,' + b64;
                        videoEl.src = src;
                        downloadBtn.href = src;
                    }

                    videoEl.style.display = 'block';
                    downloadBtn.style.display = 'inline-block';
                    setStatus('✓ Done! Your video is ready.', 'success');
                } else {
                    setStatus('✗ No video in response: ' + JSON.stringify(data), 'error');
                }
            } else {
                setTimeout(() => pollOperation(operationName), 8000);
            }
        } catch (err) {
            setStatus('✗ Polling error: ' + err.message, 'error');
            document.getElementById('generate-btn').disabled = false;
        }
    }
</script>

</body>
</html>
